name: CI

on:
  push:
    branches: [devin/1771121924-sports-betting-ml]
  pull_request:
    branches: [devin/1771121924-sports-betting-ml]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter
        run: |
          pip install ruff
          ruff check . || true

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ || true
