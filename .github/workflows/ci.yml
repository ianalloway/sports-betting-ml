name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test imports
      run: |
        python -c "import streamlit; import pandas; import numpy; import xgboost; print('All imports successful')"

    - name: Verify model training
      run: |
        python -c "from model.train import create_sample_data, prepare_features, train_model; df = create_sample_data(); X, y = prepare_features(df); model = train_model(X, y); print(f'Model trained with {len(X)} samples')"

    - name: Verify prediction functions
      run: |
        python -c "from model.predict import predict_game, get_default_stats, predict_with_confidence; stats = get_default_stats(); h_prob, a_prob = predict_game(stats, stats); print(f'Prediction: Home {h_prob:.1%}, Away {a_prob:.1%}')"

  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: false
        tags: sports-betting-ml:latest
